<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSV Dashboard</title>
  <style>
    :root {
      --background: #09090b;
      --foreground: #fafafa;
      --card: #18181b;
      --card-hover: #27272a;
      --border: #27272a;
      --muted: #71717a;
      --muted-foreground: #a1a1aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --background: #ffffff;
        --foreground: #09090b;
        --card: #f4f4f5;
        --card-hover: #e4e4e7;
        --border: #e4e4e7;
        --muted: #a1a1aa;
        --muted-foreground: #71717a;
      }
    }

    [data-theme="light"] {
      --background: #ffffff;
      --foreground: #09090b;
      --card: #f4f4f5;
      --card-hover: #e4e4e7;
      --border: #e4e4e7;
      --muted: #a1a1aa;
      --muted-foreground: #71717a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--background);
      color: var(--foreground);
      height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Loading state */
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--muted);
      font-size: 14px;
    }

    /* Header */
    #header {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      gap: 12px;
    }

    .app-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* Tabs */
    .view-tabs {
      display: flex;
      gap: 2px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 2px;
    }

    .view-tab {
      padding: 6px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: calc(var(--radius) - 2px);
      transition: all 0.15s ease;
    }

    .view-tab:hover {
      color: var(--foreground);
    }

    .view-tab.active {
      background: var(--background);
      color: var(--foreground);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    /* Panels */
    .panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      gap: 16px;
    }

    .panel.active {
      display: flex;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--muted-foreground);
      margin-top: 4px;
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    /* Form elements */
    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="number"] {
      flex: 1;
      padding: 8px 12px;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--foreground);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button.btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--card-hover);
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 12px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Results container */
    .results {
      margin-top: 12px;
    }

    .results-empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 24px;
    }

    /* Grid for ordinals */
    .ordinals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .ordinal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .ordinal-card:hover {
      border-color: var(--accent);
    }

    .ordinal-preview {
      aspect-ratio: 1;
      background: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ordinal-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ordinal-preview .placeholder {
      color: var(--muted);
      font-size: 24px;
    }

    .ordinal-info {
      padding: 8px 10px;
    }

    .ordinal-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ordinal-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Copy button */
    .copy-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      font-size: 13px;
    }

    .copy-btn:hover {
      color: var(--foreground);
    }

    /* Truncated text */
    .truncated {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: bottom;
    }

    /* Status badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-success {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    /* Error state */
    .error-message {
      color: var(--danger);
      font-size: 13px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: var(--radius);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Address display */
    .address-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 13px;
      word-break: break-all;
    }

    /* Price display */
    .price-change {
      font-size: 14px;
      font-weight: 500;
    }

    .price-up { color: var(--success); }
    .price-down { color: var(--danger); }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Connecting to BSV MCP...</div>
  </div>

  <div id="header">
    <span class="app-title">BSV Dashboard</span>
    <div class="view-tabs" role="tablist">
      <button class="view-tab active" data-view="explorer" role="tab" aria-selected="true">Explorer</button>
      <button class="view-tab" data-view="wallet" role="tab" aria-selected="false">Wallet</button>
      <button class="view-tab" data-view="ordinals" role="tab" aria-selected="false">Ordinals</button>
    </div>
  </div>

  <div id="explorer-panel" class="panel active"></div>
  <div id="wallet-panel" class="panel"></div>
  <div id="ordinals-panel" class="panel"></div>

  <script type="module" src="./mcp-app.ts"></script>
</body>
</html>
